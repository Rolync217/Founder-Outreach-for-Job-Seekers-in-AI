services:

  # ── PostgreSQL ────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB:       outreach
      POSTGRES_USER:     app
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d outreach"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Daily pipeline scheduler ──────────────────────────────────────────────
  scheduler:
    build: .
    image: ${DOCKER_IMAGE:-outreach-pipeline:latest}
    command: python scheduler.py
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://app:${POSTGRES_PASSWORD}@db:5432/outreach
    volumes:
      - ./config.yaml:/app/config.yaml:ro   # required — gitignored, must be present on the host
      - ./reports:/app/reports
      - ./.tmp:/app/.tmp
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      # Scheduler touches /tmp/scheduler_heartbeat after each successful run.
      # We check that the file exists and was written within the last 25 hours.
      test:
        - "CMD"
        - "python"
        - "-c"
        - |
          import os, time, sys
          hb = '/tmp/scheduler_heartbeat'
          if not os.path.exists(hb):
              sys.exit(0)  # not yet run today — that's fine
          age = time.time() - os.path.getmtime(hb)
          sys.exit(0 if age < 90000 else 1)
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 60s

volumes:
  pg-data:
